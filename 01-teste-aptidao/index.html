<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Teste de Aptidão</title>
  <link rel="stylesheet" href="style.css" />  
  <script src="./app.js" defer></script>
</head>

<body>
  <main>
    <div class="conteudo">
      <a href="../index.html" class="voltar">← Voltar</a>

      <h1>
        Teste de <span>Aptidão</span>
      </h1>
      <p class="descricao">
        Digite o tempo, em segundos, da corrida de 100m.
      </p>

      <label>Tempo (s)</label>
      <input id="tempo" type="number" placeholder="Ex: 13.8"/>
      <!--sempre que algum elemento precisar ineragir com o js, é necessario ter um id-->

      <!--chama a função avaliar, sempre que clicarem 1 vez no botão-->
      <button onclick="avaliar()" >Avaliar</button>

      <!--guarda o resultado da classe "apto" ou "nao-apto"-->
      <!--foi criado uma função removerClasses para que a classe resultado-->
      <!--não acabe guardando dois resultados ao mesmo tempo, mesmo após ser digitado outro valor-->
      <div id="resultado" class="resultado">
        O resultado aparecerá aqui
      </div>
    </div>
  </main>

  <footer>
    <p>Prof. Fernando Leonid</p>
  </footer>
</body>

</html>
